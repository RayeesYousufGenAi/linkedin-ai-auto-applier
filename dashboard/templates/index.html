<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn AI Bot — Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117; color: #c9d1d9;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #0077B5, #004182);
            padding: 24px 40px; text-align: center;
        }
        .header h1 { color: #fff; font-size: 28px; margin-bottom: 4px; }
        .header p { color: rgba(255,255,255,0.8); font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 20px; text-align: center;
        }
        .stat-card .number { font-size: 36px; font-weight: 700; color: #58a6ff; }
        .stat-card .label { font-size: 13px; color: #8b949e; margin-top: 4px; }
        .stat-card.success .number { color: #3fb950; }
        .stat-card.warning .number { color: #d29922; }
        .stat-card.error .number { color: #f85149; }
        .section-title { font-size: 20px; margin-bottom: 16px; color: #f0f6fc; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 12px; overflow: hidden; }
        th { background: #21262d; padding: 12px 16px; text-align: left; font-size: 13px; color: #8b949e; }
        td { padding: 12px 16px; border-top: 1px solid #21262d; font-size: 14px; }
        tr:hover { background: #1c2128; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
        }
        .badge.applied { background: #0d2818; color: #3fb950; }
        .loading { text-align: center; padding: 40px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 LinkedIn AI Bot — Dashboard</h1>
        <p>Application history and session analytics</p>
    </div>
    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="loading">Loading stats...</div>
        </div>
        <h2 class="section-title">📋 Recent Applications</h2>
        <table id="jobsTable">
            <thead>
                <tr><th>Job Title</th><th>Company</th><th>Date</th><th>Status</th></tr>
            </thead>
            <tbody id="jobsBody">
                <tr><td colspan="4" class="loading">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card success"><div class="number">${data.total_applied}</div><div class="label">Total Applied</div></div>
                    <div class="stat-card warning"><div class="number">${data.total_skipped}</div><div class="label">Skipped</div></div>
                    <div class="stat-card error"><div class="number">${data.total_failed}</div><div class="label">Failed</div></div>
                    <div class="stat-card"><div class="number">${data.total_sessions}</div><div class="label">Sessions</div></div>
                    <div class="stat-card"><div class="number">${data.unique_companies}</div><div class="label">Companies</div></div>
                `;
                const tbody = document.getElementById('jobsBody');
                if (data.recent_jobs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="loading">No applications yet. Run the bot first!</td></tr>';
                    return;
                }
                tbody.innerHTML = data.recent_jobs.map(job => `
                    <tr>
                        <td><a href="${job.url}" target="_blank" style="color:#58a6ff;text-decoration:none">${job.title}</a></td>
                        <td>${job.company}</td>
                        <td>${new Date(job.timestamp).toLocaleDateString()}</td>
                        <td><span class="badge applied">${job.status}</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('statsGrid').innerHTML = '<div class="loading">Run the bot first to see stats!</div>';
            }
        }
        loadStats();
    </script>
</body>
</html>
